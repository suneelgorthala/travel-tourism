<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Travel & Tourism</title>
  <link rel="stylesheet" href="Assets/CSS/style.css" />
  <link rel="stylesheet" href="Assets/CSS/main.css" />
</head>
<body>
  <div id="header-container">
    <header>
      <h1>Travel & Tourism</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="About Us/index.html">About Us</a>
        <a href="Contactus/index.html">Contact Us</a>
        <button type="button" id="logout-button" class="nav-logout hidden">Logout</button>
      </nav>
    </header>
  </div>

  <main class="section-hero">
    <section class="auth-section">
      <div class="auth-card">
        <h2>Create your account</h2>
        <p>Sign up now to continue to Travel & Tourism.</p>

        <form id="signup-form" class="auth-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input id="signup-name" type="text" name="name" required />
          </div>
          <div class="form-group">
            <label for="signup-email">Email address</label>
            <input id="signup-email" type="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" name="password" required />
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input id="signup-confirm" type="password" name="confirmPassword" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn">Sign Up</button>
            <p>Already have an account? <a class="form-link" href="login.html">Login here</a></p>
          </div>
          <p class="form-message" id="signup-message"></p>
        </form>
      </div>
    </section>
  </main>

  <div id="footer-container">
    <footer>
      <p>&copy; 2026 Travel & Tourism. All rights reserved.</p>
    </footer>
  </div>

  <script src="Assets/JS/auth.js"></script>
</body>
</html>
