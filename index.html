<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Travel & Tourism</title>
  <link rel="stylesheet" href="../Assets/CSS/style.css" />
</head>
<body>
  <div id="header-container">
    <header>
      <h1>Travel & Tourism</h1>
      <nav>
        <a href="../index.html">Home</a>
        <a href="../About Us/index.html">About Us</a>
        <a href="index.html">Contact Us</a>
        <button type="button" id="logout-button" class="nav-logout hidden">Logout</button>
      </nav>
    </header>
  </div>


  <main style="max-width: 620px; margin: 2.5rem auto; padding: 0 1rem; background: linear-gradient(135deg, #f9fafc 0%, #f48d34 100%); border-radius: 14px; box-shadow: 0 12px 34px rgba(0,0,0,.12);">
    <h2>Contact Us</h2>
    <p>Questions? Start your next trip by reaching out:</p>

    <form class="contact-form" style="display:grid;gap:1rem;">
      <label>Name
        <input type="text" name="name" required style="width:100%;padding:.6rem;border:1px solid #cdd4e2;border-radius:8px;" />
      </label>
      <label>Email
        <input type="email" name="email" required style="width:100%;padding:.6rem;border:1px solid #cdd4e2;border-radius:8px;" />
      </label>
      <label>Message
        <textarea name="message" rows="5" required style="width:100%;padding:.6rem;border:1px solid #cdd4e2;border-radius:8px;"></textarea>
      </label>
      <button type="submit" style="border:none;background:#0078d4;color:#fff;padding:.75rem 1.1rem;border-radius:8px;font-weight:700;">Send Message</button>
    </form>

    <p style="margin-top:1.25rem;color:#0a182b;">Or call us: <strong>+91-8333856577</strong></p>
  </main>

  <div id="footer-container">
    <footer>
      <p>&copy; 2026 Travel & Tourism. All rights reserved.</p>
    </footer>
  </div>
  <script src="../Assets/JS/auth.js"></script>
</body>
</html>
